server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /auth/ {
        proxy_pass https://blogger-api-641537543820.europe-west1.run.app;
        proxy_set_header Host blogger-api-641537543820.europe-west1.run.app;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
    }

    location /chat/ {
        proxy_pass https://blogger-api-641537543820.europe-west1.run.app;
        proxy_set_header Host blogger-api-641537543820.europe-west1.run.app;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    location / {
        try_files $uri /index.html;
    }
}
